apiVersion: v1
kind: Service
metadata:
  name: random-generator
  namespace: default
  labels:
    app: random-generator
spec:
  ports:
    - port: 80
      name: web
  clusterIP: None
  selector:
    app: random-generator
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: random-generator
  namespace: default
  labels:
    app: random-generator
spec:
  selector:
    matchLabels:
      app: random-generator
  serviceName: "random-generator"
  replicas: 3
  template:
    metadata:
      labels:
        app: random-generator
    spec:
      containers:
        - name: random-generator
          image: sbeliakou/random-generator:2
          ports:
            - containerPort: 80
              name: web
          volumeMounts:
            - name: logs
              mountPath: /logs
  volumeClaimTemplates:
    - metadata:
        name: logs
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Mi
