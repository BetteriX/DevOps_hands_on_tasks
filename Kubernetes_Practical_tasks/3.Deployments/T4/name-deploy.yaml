apiVersion: apps/v1
kind: Deployment
metadata:
  name: zsolt-app
  labels:
    task: deploy
    app: zsolt-app
    student: zsolt
spec:
  replicas: 1
  selector:
    matchLabels:
      deploy: zsolt-app
  template:
    metadata:
      labels:
        deploy: zsolt-app
        kind: redis
        role: master
        tier: db
    spec:
      initContainers:
        - name: init
          image: busybox:1.34
          command: ["sh", "-c", "sleep 10"]

      containers:
        - name: redis-master
          image: redis:5-alpine
          ports:
            - containerPort: 6379
